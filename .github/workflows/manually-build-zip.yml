name: Manually Build release zip

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy'
        required: true
        type: string
        default: ''

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    env:
      PLUGIN_ZIP: ps-hyphenate.zip
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        run: |
          composer install --no-dev --optimize-autoloader

      - name: Archive Release
        run: |
          mkdir -p build/ps-hyphenate
          rsync -a ./ build/ps-hyphenate/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.vscode' \
            --exclude 'build' \
            --exclude 'node_modules' \
            --exclude 'tests' \
            --exclude 'docs' \
            --exclude 'composer.json' \
            --exclude 'composer.lock' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'phpunit.xml' \
            --exclude 'phpunit.xml.dist' \
            --exclude 'phpcs.xml' \
            --exclude 'vitest.config.js' \
            --exclude 'i18n-map.json' \
            --exclude '.editorconfig' \
            --exclude '.eslintignore' \
            --exclude '.phpunit.result.cache' \
            --exclude '.eslintrc.js' \
            --exclude '.gitignore' \
            --exclude '.gitattributes' \
            --exclude '*.log' \
            --exclude 'CHANGELOG.md' \
            --exclude 'README.md'
          cd build
          zip -r "../$PLUGIN_ZIP" ps-hyphenate

      - name: Verify Archive Contents
        run: |
          echo "Listing $PLUGIN_ZIP entries:"
          unzip -l "$PLUGIN_ZIP" || { echo "Failed to list zip contents"; exit 1; }
          echo "Total files: $(unzip -l "$PLUGIN_ZIP" | awk 'END{print $2}')"

          if unzip -l "$PLUGIN_ZIP" | grep -q "ps-hyphenate/vendor/yahnis-elsts/plugin-update-checker"; then
            echo "Plugin Update Checker is included"
          else
            echo "ERROR: Plugin Update Checker is missing from the release"
            exit 1
          fi

      - name: Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda #v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ env.PLUGIN_ZIP }}
          tag_name: ${{ github.event.inputs.tag }}
